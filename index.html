<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGCBILL - Transport Invoice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-gray-100 p-2 md:p-10">
    <div class="max-w-4xl mx-auto bg-white p-6 shadow-xl border-t-8 border-blue-600">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-blue-700">SGC Transport</h1>
            <button onclick="window.print()" class="no-print bg-green-500 text-white px-4 py-2 rounded">Print Bill</button>
        </div>

        <div class="no-print grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 bg-blue-50 p-4 rounded">
            <input type="text" id="truckNo" placeholder="गाड़ी नंबर" class="border p-2">
            <input type="text" id="from" placeholder="कहाँ से" class="border p-2">
            <input type="text" id="to" placeholder="कहाँ तक" class="border p-2">
            <input type="number" id="amount" placeholder="कुल भाड़ा (Amount)" class="border p-2">
            <button onclick="generateBill()" class="col-span-full bg-blue-600 text-white py-2 rounded font-bold">Bill Generate Karein</button>
        </div>

        <div id="billSection" class="border-2 border-gray-300 p-6">
            <div class="text-center mb-6 border-bottom">
                <h2 class="text-2xl font-bold uppercase">Goods Receipt / बिल्टी</h2>
                <p>Address: Lucknow, Uttar Pradesh | Mobile: +91 XXXXXXXX</p>
            </div>
            
            <div class="grid grid-cols-2 gap-10 mb-6">
                <div>
                    <p><strong>Truck No:</strong> <span id="dispTruck">-</span></p>
                    <p><strong>From:</strong> <span id="dispFrom">-</span></p>
                </div>
                <div class="text-right">
                    <p><strong>Date:</strong> <span id="dispDate">--/--/----</span></p>
                    <p><strong>To:</strong> <span id="dispTo">-</span></p>
                </div>
            </div>

            <table class="w-full border-collapse border border-gray-400 mb-6">
                <thead>
                    <tr class="bg-gray-100">
                        <th class="border border-gray-400 p-2">Description</th>
                        <th class="border border-gray-400 p-2">Amount (₹)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="border border-gray-400 p-4">Transport Freight Charges</td>
                        <td class="border border-gray-400 p-4 text-right" id="dispAmount">0.00</td>
                    </tr>
                </tbody>
            </table>

            <div class="flex justify-between mt-10">
                <div class="text-center border-t border-black w-32">Driver Sign</div>
                <div class="text-center border-t border-black w-32">For SGC Transport</div>
            </div>
        </div>
    </div>

    <script>
        function generateBill() {
            document.getElementById('dispTruck').innerText = document.getElementById('truckNo').value;
            document.getElementById('dispFrom').innerText = document.getElementById('from').value;
            document.getElementById('dispTo').innerText = document.getElementById('to').value;
            document.getElementById('dispAmount').innerText = '₹' + document.getElementById('amount').value;
            document.getElementById('dispDate').innerText = new Date().toLocaleDateString();
        }
    </script>
</body>
</html>
